spring:
  datasource:
    url: jdbc:h2:mem:balanced;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
  flyway:
    enabled: false

server:
  port: 0

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus